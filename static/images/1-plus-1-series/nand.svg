<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" font-family="Helvetica, Arial, sans-serif">
  <rect width="460" height="240" fill="white"/>

  <!-- gate body: flat back, rounded front -->
  <path d="M140,40 L200,40 A80,80 0 0 1 200,200 L140,200 Z" fill="white" stroke="black" stroke-width="6"/>

  <!-- inversion bubble -->
  <circle cx="293" cy="120" r="13" fill="white" stroke="black" stroke-width="6"/>

  <!-- inputs -->
  <line x1="62" y1="80" x2="140" y2="80" stroke="black" stroke-width="6"/>
  <line x1="62" y1="160" x2="140" y2="160" stroke="black" stroke-width="6"/>
  <text x="48" y="94" text-anchor="end" font-size="44">A</text>
  <text x="48" y="174" text-anchor="end" font-size="44">B</text>

  <!-- output -->
  <line x1="306" y1="120" x2="372" y2="120" stroke="black" stroke-width="6"/>
  <text x="384" y="134" font-size="44">out</text>
</svg>
