<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 145" font-family="Helvetica, Arial, sans-serif" font-size="15">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="black"/>
    </marker>
  </defs>
  <rect width="350" height="145" fill="white"/>

  <!-- DFF -->
  <rect x="115" y="28" width="120" height="56" fill="#eeeeee" stroke="black" stroke-width="1.5"/>
  <text x="175" y="61" text-anchor="middle">DFF</text>
  <!-- clock input triangle on the bottom edge -->
  <path d="M168,84 L182,84 L175,73 z" fill="white" stroke="black" stroke-width="1.5"/>

  <!-- in -->
  <text x="40" y="61" text-anchor="end">in</text>
  <line x1="48" y1="56" x2="113" y2="56" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- out -->
  <line x1="235" y1="56" x2="300" y2="56" stroke="black" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="308" y="61">out</text>

  <!-- behaviour -->
  <text x="175" y="125" text-anchor="middle">out(t) = in(t-1)</text>
</svg>
